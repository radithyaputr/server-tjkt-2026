upstream node_app {
    server app:3000;
}

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/xml+rss application/atom+xml
    image/svg+xml image/x-icon
    font/woff font/woff2;

server {
    listen 80;
    server_name _;

    client_max_body_size 0;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src 'self' fonts.gstatic.com fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self';" always;

    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location /repository/ {
        auth_request /auth-check;
        alias /usr/share/nginx/html/repository/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location = /auth-check {
        internal;
        proxy_pass http://node_app/api/auth/check-repo;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /memories/ {
        alias /usr/share/nginx/html/repository/memories/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
